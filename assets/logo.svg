<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Sushi Burger Club Shanghai monogram">
  <defs>
    <style>
      .chop { stroke: currentColor; stroke-width: 4; stroke-linecap: round; }
      .tip  { fill: currentColor; }
      .ltr  { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; font-weight: 800; font-size: 32px; fill: currentColor; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>
  <!-- 2x2 corner letters: S B / C S -->
  <text class="ltr" x="30" y="32">S</text>
  <text class="ltr" x="90" y="32">B</text>
  <text class="ltr" x="30" y="90">C</text>
  <text class="ltr" x="90" y="90">S</text>
  <!-- crossed chopsticks through the centre -->
  <line class="chop" x1="42" y1="42" x2="78" y2="78"/>
  <line class="chop" x1="78" y1="42" x2="42" y2="78"/>
  <circle class="tip" cx="42" cy="42" r="3"/>
  <circle class="tip" cx="78" cy="42" r="3"/>
</svg>
